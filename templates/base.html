<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Transport Tracker{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="apple-touch-icon" href="/static/favicon.svg">
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        :root {
            --bg: #f5f3ff;
            --bg-soft: #ecebfa;
            --card: #ffffff;
            --card-soft: #faf9ff;
            --ink: #0b0e1a;
            --ink-soft: #2a2e44;
            --muted: #6a6e85;
            --hairline: rgba(15,18,40,0.06);
            --hairline-strong: rgba(15,18,40,0.12);
            --shadow-card: 0 1px 2px rgba(15,18,40,0.04), 0 8px 24px rgba(15,18,40,0.06);
            --shadow-card-hover: 0 2px 4px rgba(15,18,40,0.06), 0 12px 32px rgba(15,18,40,0.10);
            --shadow-glow: 0 8px 30px rgba(99,102,241,0.22);
            --accent: #6366f1;
            --accent-soft: rgba(99,102,241,0.10);
            --accent-2: #a855f7;
            --green: #10b981;
            --green-soft: rgba(16,185,129,0.10);
            --amber: #f59e0b;
            --amber-soft: rgba(245,158,11,0.10);
            --red: #ef4444;
            --red-soft: rgba(239,68,68,0.10);
            --grad-violet: linear-gradient(135deg, #6366f1 0%, #a855f7 60%, #ec4899 100%);
            --grad-rose: linear-gradient(135deg, #f43f5e 0%, #fb923c 100%);
            --grad-cyan: linear-gradient(135deg, #06b6d4 0%, #6366f1 100%);
            --grad-emerald: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
        }
        .dark {
            --bg: #0a0d1a;
            --bg-soft: #11152a;
            --card: #14182b;
            --card-soft: #1a1f36;
            --ink: #f1f3fb;
            --ink-soft: #c8ccdf;
            --muted: #8089a5;
            --hairline: rgba(241,243,251,0.06);
            --hairline-strong: rgba(241,243,251,0.10);
            --shadow-card: 0 1px 2px rgba(0,0,0,0.4), 0 12px 28px rgba(0,0,0,0.32);
            --shadow-card-hover: 0 2px 4px rgba(0,0,0,0.5), 0 20px 40px rgba(0,0,0,0.4);
            --shadow-glow: 0 8px 30px rgba(129,140,248,0.25);
            --accent: #818cf8;
            --accent-soft: rgba(129,140,248,0.14);
            --accent-2: #c084fc;
            --green: #34d399;
            --green-soft: rgba(52,211,153,0.14);
            --amber: #fbbf24;
            --amber-soft: rgba(251,191,36,0.14);
            --red: #f87171;
            --red-soft: rgba(248,113,113,0.14);
        }
        html, body {
            background: var(--bg);
            color: var(--ink);
        }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            background-image:
                radial-gradient(ellipse 90% 50% at 100% 0%, var(--accent-soft), transparent 50%),
                radial-gradient(ellipse 60% 40% at 0% 100%, rgba(168,85,247,0.06), transparent 50%);
            background-attachment: fixed;
        }
        .dark body {
            background-image:
                radial-gradient(ellipse 90% 50% at 100% 0%, rgba(129,140,248,0.10), transparent 55%),
                radial-gradient(ellipse 70% 50% at 0% 110%, rgba(192,132,252,0.06), transparent 55%);
        }

        /* RATP official line colors */
        .line-metro-1  { background: #FFCD00; color: #000; }
        .line-metro-2  { background: #003CA6; color: #fff; }
        .line-metro-3  { background: #837902; color: #fff; }
        .line-metro-3b { background: #6EC4E8; color: #000; }
        .line-metro-4  { background: #CF009E; color: #fff; }
        .line-metro-5  { background: #FF7E2E; color: #fff; }
        .line-metro-6  { background: #6ECA97; color: #000; }
        .line-metro-7  { background: #FA9ABA; color: #000; }
        .line-metro-7b { background: #6ECA97; color: #000; }
        .line-metro-8  { background: #E19BDF; color: #000; }
        .line-metro-9  { background: #B6BD00; color: #000; }
        .line-metro-10 { background: #C9910D; color: #fff; }
        .line-metro-11 { background: #704B1C; color: #fff; }
        .line-metro-12 { background: #007852; color: #fff; }
        .line-metro-13 { background: #6EC4E8; color: #000; }
        .line-metro-14 { background: #62259D; color: #fff; }
        .line-rer-A { background: #E3051C; color: #fff; }
        .line-rer-B { background: #5291CE; color: #fff; }
        .line-rer-C { background: #FFCD00; color: #000; }
        .line-rer-D { background: #00A86B; color: #fff; }
        .line-rer-E { background: #BD76A1; color: #fff; }
        .line-tram-T1  { background: #003CA6; color: #fff; }
        .line-tram-T2  { background: #CF009E; color: #fff; }
        .line-tram-T3a { background: #FF7E2E; color: #fff; }
        .line-tram-T3b { background: #00A86B; color: #fff; }
        .line-tram-T4  { background: #E3051C; color: #fff; }
        .line-tram-T5  { background: #6B7280; color: #fff; }
        .line-tram-T6  { background: #E3051C; color: #fff; }
        .line-tram-T7  { background: #704B1C; color: #fff; }
        .line-tram-T8  { background: #837902; color: #fff; }
        .line-tram-T9  { background: #003CA6; color: #fff; }
        .line-tram-T10 { background: #C9910D; color: #fff; }
        .line-tram-T11 { background: #FF7E2E; color: #fff; }
        .line-tram-T12 { background: #007852; color: #fff; }
        .line-tram-T13 { background: #6EC4E8; color: #000; }

        /* Badge shapes */
        .line-badge {
            display: inline-flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 0.7rem; flex-shrink: 0;
            width: 2rem; height: 2rem; border-radius: 9999px;
            letter-spacing: -0.02em;
            box-shadow: 0 2px 8px rgba(0,0,0,.4);
        }
        .line-badge-lg { width: 2.75rem; height: 2.75rem; font-size: 0.9rem; }
        .badge-rer { border-radius: 0.375rem; }
        .badge-tram { border-radius: 9999px; font-size: 0.55rem; padding: 0 0.15rem; }

        /* Type icons */
        .type-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 1.5rem; height: 1.5rem; border-radius: 9999px;
            font-weight: 800; font-size: 0.6rem; color: #fff; margin-right: 0.35rem;
        }
        .type-icon-metro { background: #818cf8; border-radius: 9999px; }
        .type-icon-rer   { background: #818cf8; border-radius: 0.2rem; }
        .type-icon-tram   { background: #818cf8; border-radius: 9999px; }

        .num { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

        /* Soft card */
        .card {
            background: var(--card);
            border: 1px solid var(--hairline);
            border-radius: 20px;
            padding: 1.4rem 1.5rem;
            box-shadow: var(--shadow-card);
            transition: box-shadow 200ms, transform 200ms, border-color 200ms;
        }
        .card:hover {
            box-shadow: var(--shadow-card-hover);
            border-color: var(--hairline-strong);
        }
        .card-flat {
            background: var(--card-soft);
            border: 1px solid var(--hairline);
            border-radius: 16px;
        }
        .card-glow { /* legacy compat — behaves like .card with a violet top edge */
            position: relative;
        }
        .card-glow::before {
            content: '';
            position: absolute;
            top: 0; left: 16px; right: 16px;
            height: 2px;
            background: var(--grad-violet);
            opacity: 0.7;
            border-radius: 0 0 4px 4px;
        }

        /* Hero gradient stat card */
        .stat-card {
            position: relative;
            border-radius: 22px;
            padding: 1.6rem 1.65rem;
            color: #fff;
            overflow: hidden;
            box-shadow: var(--shadow-glow);
            isolation: isolate;
        }
        .stat-card::before {
            content: "";
            position: absolute; inset: 0;
            background-image:
                radial-gradient(circle at 110% -20%, rgba(255,255,255,0.30) 0%, transparent 50%),
                radial-gradient(circle at -10% 120%, rgba(255,255,255,0.18) 0%, transparent 55%);
            pointer-events: none;
            z-index: -1;
        }
        .stat-card::after {
            content: "";
            position: absolute;
            top: 14px; right: 14px;
            width: 110px; height: 110px;
            border-radius: 9999px;
            background: rgba(255,255,255,0.10);
            filter: blur(1px);
            pointer-events: none;
            z-index: -1;
        }
        .stat-violet { background: var(--grad-violet); }
        .stat-rose   { background: var(--grad-rose); }
        .stat-cyan   { background: var(--grad-cyan); }
        .stat-emerald { background: var(--grad-emerald); }

        /* Eyebrow label */
        .eyebrow {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--muted);
        }

        /* Pulse */
        .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: pulse 1.8s ease-in-out infinite; display: inline-block; position: relative; }
        .pulse-dot::after {
            content: "";
            position: absolute; inset: -4px;
            border-radius: 50%;
            background: var(--red);
            opacity: 0.35;
            animation: pulse-ring 1.8s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.7; } }
        @keyframes pulse-ring { 0% { transform:scale(0.6); opacity:0.5; } 100% { transform:scale(1.6); opacity:0; } }

        /* Pills */
        .pill {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.25rem 0.7rem;
            border-radius: 9999px;
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.01em;
        }
        .pill-violet { background: var(--accent-soft); color: var(--accent); }
        .pill-green  { background: var(--green-soft); color: var(--green); }
        .pill-amber  { background: var(--amber-soft); color: var(--amber); }
        .pill-red    { background: var(--red-soft); color: var(--red); }

        /* Tabs pills */
        .tab-pill {
            padding: 0.4rem 0.85rem;
            border-radius: 9999px;
            font-size: 12px; font-weight: 600;
            transition: all 180ms;
            cursor: pointer; user-select: none;
            color: var(--muted);
            background: transparent;
            border: 1px solid transparent;
        }
        .tab-pill:hover { color: var(--ink); background: var(--bg-soft); }
        .tab-pill.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(99,102,241,0.30);
        }
        .dark .tab-pill.active { box-shadow: 0 4px 14px rgba(129,140,248,0.32); }

        /* Nav */
        .nav-shell {
            background: var(--card);
            border: 1px solid var(--hairline);
            border-radius: 9999px;
            padding: 0.35rem;
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(12px);
        }
        .nav-link {
            color: var(--muted);
            font-weight: 600;
            transition: all 180ms;
            border-radius: 9999px;
        }
        .nav-link:hover { color: var(--ink); background: var(--bg-soft); }
        .nav-link.active {
            background: var(--accent);
            color: #fff !important;
            box-shadow: 0 4px 12px rgba(99,102,241,0.30);
        }
        .dark .nav-link.active { box-shadow: 0 4px 14px rgba(129,140,248,0.32); }
        .nav-highlight .pin {
            display: inline-block; width: 6px; height: 6px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ec4899, #f97316);
            margin-right: 6px;
            vertical-align: middle;
        }

        .icon-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 38px; height: 38px;
            border-radius: 9999px;
            background: var(--card);
            border: 1px solid var(--hairline);
            color: var(--muted);
            transition: all 180ms;
            box-shadow: var(--shadow-card);
        }
        .icon-btn:hover { color: var(--ink); transform: translateY(-1px); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--hairline-strong); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

        /* Status ring colors */
        .status-ok { border-color: var(--green); }
        .status-alert { border-color: var(--red); background: var(--red-soft); }
        .status-works { border-color: var(--amber); background: var(--amber-soft); }

        /* Selection */
        ::selection { background: var(--accent); color: #fff; }

        /* Bar/track */
        .track { height: 6px; border-radius: 9999px; background: var(--hairline-strong); overflow: hidden; }
        .track > span { display: block; height: 100%; border-radius: 9999px; transition: width 400ms ease; }

        /* Avatar circle */
        .avatar {
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 9999px;
            font-weight: 700; font-size: 13px; color: #fff;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Top nav -->

        <div class="max-w-7xl mx-auto flex items-center justify-between gap-3">

                <div class="relative w-9 h-9 rounded-xl flex items-center justify-center" style="background: var(--grad-violet); box-shadow: var(--shadow-glow);">
                    <svg viewBox="0 0 24 24" fill="none" class="w-5 h-5">
                        <path d="M3 12c0-4.5 4-8 9-8s9 3.5 9 8-4 8-9 8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="12" cy="12" r="2.5" fill="#fff"/>
                    </svg>
                </div>
                <span class="font-extrabold tracking-tight text-[17px]" style="color: var(--ink);">Transit<span style="color: var(--accent)">·</span>IDF</span>

            <nav class="nav-shell hidden lg:flex items-center gap-0.5">

                <a href="/my-commute" class="nav-link px-4 py-2 text-[13px] whitespace-nowrap">Mon trajet</a>
                <a href="/punctuality" class="nav-link nav-highlight px-4 py-2 text-[13px] whitespace-nowrap"><span class="pin"></span>Pires RER</a>

            </nav>

            <div class="flex items-center gap-2 shrink-0">
                <span class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full pill pill-green">
                    <span class="w-1.5 h-1.5 rounded-full" style="background: var(--green);"></span>
                    Collecte active
                </span>
                <a href="/admin" class="icon-btn" title="Admin">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                </a>
                <button onclick="toggleTheme()" class="icon-btn" title="Changer de thème">
                    <svg class="w-4 h-4 dark:hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <svg class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                </button>
                <button onclick="manualScrape()" class="icon-btn" title="Forcer une collecte">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>

        </div>
        <nav class="lg:hidden mt-3 max-w-7xl mx-auto overflow-x-auto">
            <div class="nav-shell inline-flex items-center gap-0.5">
                <a href="/" class="nav-link px-3 py-1.5 text-[12px] whitespace-nowrap">Direct</a>
                <a href="/map" class="nav-link px-3 py-1.5 text-[12px] whitespace-nowrap">Carte</a>
                <a href="/my-commute" class="nav-link px-3 py-1.5 text-[12px] whitespace-nowrap">Mon trajet</a>
                <a href="/punctuality" class="nav-link px-3 py-1.5 text-[12px] whitespace-nowrap">Pires RER</a>
                <a href="/worst-metro-tram" class="nav-link px-3 py-1.5 text-[12px] whitespace-nowrap">Pires Métro</a>
                <a href="/compare" class="nav-link px-3 py-1.5 text-[12px] whitespace-nowrap">Comparer</a>

    </header>

    <main class="max-w-7xl mx-auto px-5 sm:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <script>
        function applyChartTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            Chart.defaults.color = isDark ? '#8089a5' : '#6a6e85';
            Chart.defaults.borderColor = isDark ? 'rgba(241,243,251,0.06)' : 'rgba(15,18,40,0.06)';
            Chart.defaults.font.family = 'Plus Jakarta Sans, system-ui, sans-serif';
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            applyChartTheme();
            if (typeof loadAll === 'function') loadAll();
        }

        async function manualScrape() {
            const btn = event.currentTarget;
            btn.classList.add('animate-spin');
            await fetch('/api/scrape', { method: 'POST' });
            btn.classList.remove('animate-spin');
            location.reload();
        }

        function statusLabel(s) {
            if (s === 'normal') return 'Normal';
            if (s === 'alerte') return 'Perturbation';
            if (s === 'normal_trav') return 'Travaux';
            return s;
        }

        function badgeClass(type) {
            if (type === 'rer') return 'badge-rer';
            if (type === 'tram') return 'badge-tram';
            return '';
        }

        function typeIcon(type) {
            if (type === 'metro') return '<span class="type-icon type-icon-metro">M</span>';
            if (type === 'rer') return '<span class="type-icon type-icon-rer">R</span>';
            if (type === 'tram') return '<span class="type-icon type-icon-tram">T</span>';
            return '';
        }

        const DOW_LABELS = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];

        function lineIcon(type, id, size = 'sm') {
            const px = size === 'lg' ? 36 : size === 'md' ? 28 : 22;
            const localName = `${type}-${id}`;
            const cls = size === 'lg' ? 'line-badge-lg' : '';
            return `<img src="/static/icons/${localName}.svg" alt="${type} ${id}" width="${px}" height="${px}" style="flex-shrink:0" onerror="this.style.display='none';this.nextElementSibling.style.display='inline-flex'"><span class="line-badge ${cls} ${badgeClass(type)} line-${type}-${id}" style="display:none;width:${px}px;height:${px}px;font-size:${px*0.35}px">${id}</span>`;
        }

        function typeHeaderIcon(type) {
            return `<img src="/static/icons/${type}.svg" alt="${type}" width="20" height="20" style="flex-shrink:0;margin-right:4px" onerror="this.outerHTML=typeIcon(type)">`;
        }

        // Highlight active nav link
        const path = window.location.pathname;
        document.querySelectorAll('.nav-link').forEach(a => {
            const href = a.getAttribute('href');
            if (href === '/' && path === '/') a.classList.add('active');
            else if (href !== '/' && path.startsWith(href)) a.classList.add('active');
        });

        // Chart.js theme
        applyChartTheme();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
